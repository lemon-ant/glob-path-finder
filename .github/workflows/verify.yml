name: Verify

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'

      - name: Detect relevant changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**/*.java'
              - '**/pom.xml'
              - '**/src/**/resources/**'
              - 'quality-gates/**'
              - '.github/workflows/*.yml'

  no-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.code != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: No build needed (no code changes)
        run: |
          echo "No Java/Maven/resource/workflow changes detected. Skipping build."
          echo "✅ Verify passed (no-op)."

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify -Dci=true
